<!DOCTYPE html>
<html>
<head>
    <title>Book Recommendation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Header -->

<button id="favBtn" class="btn btn-danger">❤️ Favorites</button>

<!-- Dark mode button (top right) -->
<div class="top-bar">
    <button id="darkToggle" class="btn btn-dark">
        🌙 Dark Mode
    </button>
</div>
<!-- Centered heading -->
<div class="container text-center mt-4">
    <h1 class="main-title">📚 Book Recommender</h1>
    <p class="sub-title">Find books based on your mood and interest</p>
</div>




<!-- Filter Section -->
<div class="container mt-4">
    <div class="card p-4 shadow">

        <!-- Search -->
        <input 
            type="text" 
            id="searchInput" 
            class="form-control mb-3" 
            placeholder="🔍 Search book by title..."
        >

        <!-- Filters -->
        <div class="row">
            <div class="col-md-6">
                <label>Genre</label>
                <select class="form-control" id="genre">
                    <option value="">--Select--</option>
                    <option value="fiction">Fiction</option>
                    <option value="fantasy">Fantasy</option>
                    <option value="romance">Romance</option>
                    <option value="selfhelp">Self Help     </option>
                    <option value="thriller">Thriller</option>
                    <option value="nonfiction">Non-Fiction</option>
                </select>
            </div>

            <div class="col-md-6">
                <label>Mood</label>
                <select class="form-control" id="mood">
                    <option value="">--Select--</option>
                    <option value="happy">Happy</option>
                    <option value="sad">Sad</option>
                    <option value="inspiring">Inspiring</option>
                    <option value="adventure">Adventure</option>
                    <option value="emotional">Emotional</option>
                    <option value="dark">Dark</option>
                    <option value="thoughtful">Thoughtful   </option>
                    <option value="patriotic">Patriotic     </option>
                    <option value="nostalgic">Nostalgic</option>
                </select>
            </div>
        </div>
       
     <!-- Button -->
    <div class="text-center mt-4">
            <button class="btn btn-primary px-4" id="btn">
                Recommend
            </button>
        </div>

    </div>
</div>
<div id="popularSection" class="container mt-5">
     <h3 class="mb-3">🔥 Popular Books</h3>
<div class="row g-4" id="popularBooks"></div> 
</div>
<div id="recommendSection" class="container mt-5" style="display:none;">
    <h3>📚 Recommended Books</h3>
    <div class="row g-4" id="books"></div>
</div>

<div id="favoriteSection" class="container mt-5" style="display:none;">
    <h3>❤️ Your Favorites</h3>
    <div class="row g-4" id="favorites"></div>
</div>

<script src="books.js"></script>
<script src="script.js"></script>
</body>
</html>
